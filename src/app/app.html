<div class="app-shell">
  <app-header />

  @if (shellError.error(); as err) {
    <div class="app-error-boundary" role="alert" aria-live="assertive">
      <span class="material-symbols-outlined boundary-icon" aria-hidden="true">error</span>
      <p class="boundary-message">{{ err.userMessage }}</p>
      <div class="boundary-actions">
        @if (shellError.reloadSuggested()) {
          <button mat-flat-button type="button" (click)="reload()">
            <mat-icon>refresh</mat-icon>
            Reload
          </button>
        }
        <button mat-button type="button" (click)="dismissError()">Dismiss</button>
      </div>
    </div>
  }

  <main class="app-main">
    <router-outlet />
  </main>
</div>

@defer (on idle) {
  <app-cost-meter />
}

@defer (on idle) {
  <app-observability-drawer />
}

<app-notification-host />
