<div class="error-dialog error-dialog--{{ tone }}">
  <header class="dialog-head">
    <span class="dialog-icon material-symbols-outlined" aria-hidden="true">{{ icon() }}</span>
    <h2 class="dialog-title">{{ data.title ?? 'Something went wrong' }}</h2>
  </header>

  <p class="dialog-message">{{ data.message }}</p>

  @if (data.details; as details) {
    <details class="dialog-details">
      <summary>Technical details</summary>
      <pre>{{ details }}</pre>
    </details>
  }

  <div class="dialog-actions">
    @if (data.cancelLabel; as cancelLabel) {
      <button mat-button type="button" (click)="cancel()">{{ cancelLabel }}</button>
    }
    <button mat-flat-button type="button" (click)="confirm()">
      {{ data.confirmLabel ?? 'OK' }}
    </button>
  </div>
</div>
